<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📷 照片编辑器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a14; color:#e8dcc8; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }

.header { text-align:center; padding:20px 16px 12px; border-bottom:1px solid rgba(201,169,110,0.2); }
.header h1 { color:#c9a96e; font-size:18px; letter-spacing:2px; }
.header p { font-size:12px; color:rgba(232,220,200,0.5); margin-top:6px; }

.chapter-block { padding:16px; border-bottom:1px solid rgba(255,255,255,0.06); }
.chapter-name { font-size:13px; color:#c9a96e; letter-spacing:2px; margin-bottom:12px; font-weight:700; }

.slots { display:flex; flex-wrap:wrap; gap:10px; }
.slot { position:relative; width:calc(50% - 5px); border-radius:12px; overflow:hidden; border:2px solid rgba(201,169,110,0.25); cursor:pointer; background:#111128; }
.slot.wide { width:100%; }
.slot img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; }
.slot.wide img { aspect-ratio:16/9; }
.slot .slot-label { padding:6px 8px; font-size:11px; color:rgba(232,220,200,0.7); background:rgba(0,0,0,0.4); }
.slot .change-btn { position:absolute; top:6px; right:6px; background:rgba(201,169,110,0.9); color:#1a1000; border:none; border-radius:20px; padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer; }
.slot:active { border-color:#c9a96e; }

/* 选择器弹窗 */
#picker-overlay { display:none; position:fixed; inset:0; background:rgba(5,5,16,0.92); z-index:9000; flex-direction:column; }
#picker-overlay.open { display:flex; }
.picker-header { padding:14px 16px; border-bottom:1px solid rgba(201,169,110,0.2); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.picker-header h3 { color:#c9a96e; font-size:14px; }
.picker-close { background:none; border:none; color:rgba(232,220,200,0.6); font-size:22px; cursor:pointer; }
.picker-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.picker-item { border-radius:10px; overflow:hidden; cursor:pointer; border:3px solid transparent; position:relative; background:#111128; transition:border-color 0.15s; }
.picker-item img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.picker-item .pic-name { font-size:9px; color:rgba(232,220,200,0.6); padding:3px 4px; text-align:center; background:rgba(0,0,0,0.5); }
.picker-item.selected { border-color:#c9a96e; }
.picker-item:active { border-color:#ff6b9d; }
.picker-footer { padding:12px 16px; border-top:1px solid rgba(201,169,110,0.2); flex-shrink:0; }
.confirm-btn { width:100%; padding:14px; background:linear-gradient(135deg,#c9a96e,#e8c97e); color:#1a1000; border:none; border-radius:50px; font-size:16px; font-weight:700; cursor:pointer; }

/* toast */
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(201,169,110,0.95); color:#1a1000; padding:10px 20px; border-radius:50px; font-size:13px; font-weight:600; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; }

/* 底部保存栏 */
#save-bar { position:fixed; bottom:0; left:0; right:0; background:#14142a; border-top:1px solid rgba(201,169,110,0.3); padding:12px 16px; display:flex; gap:10px; z-index:8000; }
#save-bar .changes-count { flex:1; display:flex; align-items:center; font-size:13px; color:rgba(232,220,200,0.7); }
#save-bar .save-btn { background:linear-gradient(135deg,#e91e8c,#ff6b9d); color:white; border:none; padding:12px 24px; border-radius:50px; font-size:14px; font-weight:700; cursor:pointer; }
#save-bar .save-btn:disabled { opacity:0.4; }

.pb { padding-bottom:80px; }
</style>
</head>
<body>

<div class="header">
  <h1>📷 照片编辑器</h1>
  <p>点击任意照片右上角「换」按钮，从全部照片里挑选替换<br>改完点底部「生成修改清单」告诉我</p>
</div>

<div class="pb" id="chapters"></div>

<!-- 选择器弹窗 -->
<div id="picker-overlay">
  <div class="picker-header">
    <h3>选择照片</h3>
    <button class="picker-close" onclick="closePicker()">✕</button>
  </div>
  <div class="picker-grid" id="picker-grid"></div>
  <div class="picker-footer">
    <button class="confirm-btn" onclick="confirmPick()">确认替换</button>
  </div>
</div>

<div id="save-bar">
  <div class="changes-count" id="changes-count">还没有修改</div>
  <button class="save-btn" id="save-btn" onclick="exportChanges()">生成修改清单 →</button>
</div>

<div id="toast"></div>

<script>
// ===== 所有章节照片配置 =====
const chapters = [
  {
    name: "Chapter 01 · 那是青涩少年时",
    slots: [
      { id:"c1_1", label:"大图", file:"2017-09-30 233222.jpg", wide:true },
      { id:"c1_2", label:"小图左", file:"2018-05-01 194559.jpg" },
      { id:"c1_3", label:"小图右", file:"2018-05-15 175306.jpg" },
    ]
  },
  {
    name: "Chapter 02 · 演唱会和拥抱",
    slots: [
      { id:"c2_1", label:"横滑1", file:"2018-06-02 204505.jpg" },
      { id:"c2_2", label:"横滑2", file:"2018-06-02 204515.jpg" },
      { id:"c2_3", label:"横滑3", file:"2018-06-02 211749.jpg" },
      { id:"c2_4", label:"横滑4", file:"2018-08-19 194037.jpg" },
    ]
  },
  {
    name: "Chapter 03 · 游乐园和平凡的日子",
    slots: [
      { id:"c3_1", label:"大图", file:"2018-09-16 222024.jpg", wide:true },
      { id:"c3_2", label:"小图左", file:"2018-09-16 163159.jpg" },
      { id:"c3_3", label:"小图右", file:"2019-04-02 141843.jpg" },
      { id:"c3_4", label:"卡片大图", file:"2020-02-14 140321.jpg", wide:true },
    ]
  },
  {
    name: "Chapter 04 · 时间线",
    slots: [
      { id:"c4_2017", label:"2017年配图", file:"IMG_20220616_184926.jpg", wide:true },
      { id:"c4_2018", label:"2018年配图", file:"2018-12-29 224038.jpg", wide:true },
      { id:"c4_1921", label:"2019-2021配图", file:"2020-12-29-13-06-18-828.jpg", wide:true },
      { id:"c4_2022", label:"2022年配图", file:"IMG_20220620_143835.jpg", wide:true },
      { id:"c4_2024", label:"2024年配图", file:"2024-01-19 225152.jpg", wide:true },
    ]
  },
  {
    name: "Chapter 05 · 带你去看每一种风景",
    slots: [
      { id:"c5_main", label:"大卡片", file:"2023-10-03 173127.jpg", wide:true },
      { id:"c5_1", label:"网格1", file:"2023-10-04 100023.jpg" },
      { id:"c5_2", label:"网格2", file:"2023-10-04 094430.jpg" },
      { id:"c5_3", label:"网格3", file:"2025-12-27 125807.jpg" },
      { id:"c5_4", label:"网格4", file:"2023-06-18 115425.jpg" },
    ]
  },
  {
    name: "Chapter 06 · 你最美的样子",
    slots: [
      { id:"c6_main", label:"大卡片", file:"DSCF3579.JPG", wide:true },
      { id:"c6_1", label:"横滑1", file:"2023-11-28 100630(1).jpg" },
      { id:"c6_2", label:"横滑2", file:"2024-02-13 214307.jpg" },
      { id:"c6_3", label:"横滑3", file:"2023-09-16 144814.jpg" },
      { id:"c6_4", label:"横滑4", file:"2023-06-16 113019.png" },
    ]
  },
  {
    name: "Chapter 07 · 那些鸡毛蒜皮",
    slots: [
      { id:"c7_1", label:"网格1", file:"2023-10-21 185019.png" },
      { id:"c7_2", label:"网格2", file:"2023-12-19 191841.jpg" },
      { id:"c7_3", label:"网格3", file:"2025-10-31 203230.jpg" },
      { id:"c7_4", label:"网格4", file:"2025-09-27 141016.jpg" },
      { id:"c7_5", label:"网格5", file:"2023-07-29 184523.jpg" },
      { id:"c7_6", label:"网格6", file:"2023-10-22 201255.jpg" },
    ]
  },
  {
    name: "Chapter 08 · 写在求婚之前",
    slots: [
      { id:"c8_main", label:"卡片大图", file:"2023-10-21 140135.jpg", wide:true },
    ]
  },
];

// 全部照片列表
const allPhotos = ["2007-02-08 025201(2).jpg","2017-09-30 233222.jpg","2018-05-01 194559.jpg","2018-05-15 172201.jpg","2018-05-15 175306.jpg","2018-06-02 204505.jpg","2018-06-02 204515.jpg","2018-06-02 211749.jpg","2018-08-19 194037.jpg","2018-08-20 095949.jpg","2018-09-16 153708.jpg","2018-09-16 163159.jpg","2018-09-16 222024.jpg","2018-11-17 184952.jpg","2018-11-17 190449.jpg","2018-12-03 112239.jpg","2018-12-10 175221.png","2018-12-29 224038.jpg","2018-12-31 173007.jpg","2019-04-02 141843.jpg","2019-11-02 125836.jpg","2020-02-14 140321.jpg","2020-06-16 134645.jpg","2020-12-20-17-54-10-179.jpg","2020-12-29-13-06-18-828.jpg","2021-06-01-20-07-14-141.jpg","2022-03-08-17-18-11-932.jpg","2023-06-16 113019.png","2023-06-18 115425.jpg","2023-06-18 122348.jpg","2023-07-02 185625.jpg","2023-07-15 164112.jpg","2023-07-15 164944(1).jpg","2023-07-29 152830.jpg","2023-07-29 184523.jpg","2023-08-01 193826.jpg","2023-08-05 204920.jpg","2023-09-16 144814.jpg","2023-09-28 211847.jpg","2023-10-02 132914.jpg","2023-10-02 145646.jpg","2023-10-02 145655.jpg","2023-10-02 211931.jpg","2023-10-03 161440.jpg","2023-10-03 173127.jpg","2023-10-04 094430.jpg","2023-10-04 100023.jpg","2023-10-06 065519.jpg","2023-10-21 140135.jpg","2023-10-21 185019.png","2023-10-22 201255.jpg","2023-11-24 195022.jpg","2023-11-25 174047.jpg","2023-11-26 001837.jpg","2023-11-28 100630(1).jpg","2023-12-08 004119.jpg","2023-12-19 191841.jpg","2023-12-31 150458.jpg","2024-01-19 225152.jpg","2024-02-13 214307.jpg","2025-09-27 141016.jpg","2025-10-31 203230.jpg","2025-12-27 125807.jpg","DSCF3579.JPG","IMG_20220616_184926.jpg","IMG_20220620_143835.jpg"];

// 当前状态
const current = {}; // id -> file
const changes = {}; // id -> newFile
chapters.forEach(ch => ch.slots.forEach(s => { current[s.id] = s.file; }));

let pickerTarget = null;
let pickerSelected = null;

// ===== 渲染章节 =====
function render() {
  const container = document.getElementById('chapters');
  container.innerHTML = '';
  chapters.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'chapter-block';
    div.innerHTML = `<div class="chapter-name">${ch.name}</div><div class="slots" id="slots_${ch.name.replace(/\s/g,'_')}"></div>`;
    container.appendChild(div);
    const slotsEl = div.querySelector('.slots');
    ch.slots.forEach(slot => {
      const file = changes[slot.id] || current[slot.id];
      const changed = !!changes[slot.id];
      const el = document.createElement('div');
      el.className = 'slot' + (slot.wide ? ' wide' : '');
      el.style.borderColor = changed ? '#c9a96e' : '';
      el.innerHTML = `
        <img src="photos/${encodeURIComponent(file)}" loading="lazy">
        <div class="slot-label">${slot.label}${changed ? ' ✓' : ''}</div>
        <button class="change-btn" onclick="openPicker('${slot.id}')">换</button>
      `;
      slotsEl.appendChild(el);
    });
  });
  updateBar();
}

// ===== 打开选择器 =====
function openPicker(slotId) {
  pickerTarget = slotId;
  pickerSelected = changes[slotId] || current[slotId];
  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';
  allPhotos.forEach(f => {
    const item = document.createElement('div');
    item.className = 'picker-item' + (f === pickerSelected ? ' selected' : '');
    item.innerHTML = `<img src="photos/${encodeURIComponent(f)}" loading="lazy"><div class="pic-name">${f.replace(/\.[^.]+$/,'')}</div>`;
    item.onclick = () => {
      document.querySelectorAll('.picker-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      pickerSelected = f;
    };
    grid.appendChild(item);
  });
  document.getElementById('picker-overlay').classList.add('open');
  // 滚动到当前选中
  setTimeout(() => {
    const sel = grid.querySelector('.selected');
    if (sel) sel.scrollIntoView({ block:'center' });
  }, 100);
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
  pickerTarget = null;
  pickerSelected = null;
}

function confirmPick() {
  if (!pickerTarget || !pickerSelected) return;
  const orig = current[pickerTarget];
  if (pickerSelected === orig) {
    delete changes[pickerTarget];
  } else {
    changes[pickerTarget] = pickerSelected;
  }
  closePicker();
  render();
  showToast('✓ 已替换');
}

// ===== 底部栏 =====
function updateBar() {
  const n = Object.keys(changes).length;
  const el = document.getElementById('changes-count');
  el.textContent = n > 0 ? `已修改 ${n} 处` : '还没有修改';
}

// ===== 导出清单 =====
function exportChanges() {
  if (Object.keys(changes).length === 0) { showToast('还没有修改哦'); return; }
  
  // 找到slot的label和chapter
  let lines = ['📋 照片修改清单\n'];
  chapters.forEach(ch => {
    const chChanges = ch.slots.filter(s => changes[s.id]);
    if (chChanges.length === 0) return;
    lines.push(`【${ch.name}】`);
    chChanges.forEach(s => {
      lines.push(`  ${s.label}：${current[s.id]}  →  ${changes[s.id]}`);
    });
    lines.push('');
  });
  
  const text = lines.join('\n');
  
  // 复制到剪贴板
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ 清单已复制！发给我就行');
  }).catch(() => {
    // 降级：弹出alert
    alert('请复制以下内容发给我：\n\n' + text);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
